<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4FD6"/>
      <stop offset="100%" stop-color="#00C8FF"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D8FFF"/>
      <stop offset="100%" stop-color="#00C8FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: Flow/infinity symbol -->
  <g filter="url(#glow)">
    <path d="M 8 32 C 8 22 14 14 24 14 C 34 14 38 24 42 32 C 46 40 50 48 58 48 C 68 48 72 38 72 32 C 72 26 68 16 58 16 C 50 16 46 22 42 32 C 38 42 34 50 24 50 C 14 50 8 42 8 32 Z"
          stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="42" cy="32" r="3" fill="url(#iconGrad)" opacity="0.8"/>
  </g>

  <!-- Text: InfinitFlow -->
  <text x="90" y="41" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#C8D0DC">InfinitFlow</text>

  <!-- Text: AI -->
  <text x="250" y="41" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="url(#aiGrad)">AI</text>
</svg>
